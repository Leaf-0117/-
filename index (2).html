<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCheck | 心情時空膠囊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; transition: background 1.5s ease; overflow-x: hidden; background-color: #f8fafc; margin: 0; min-height: 100vh; }
        .vibe-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.5; filter: blur(100px); transition: all 2s ease; }
        .vibe-orb { position: fixed; border-radius: 50%; cursor: pointer; z-index: 20; backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.4); transition: background-color 1s ease, transform 0.1s ease; box-shadow: inset 0 0 25px rgba(255,255,255,0.6), 0 15px 35px rgba(0,0,0,0.05); user-select: none; display: flex; align-items: center; justify-content: center; touch-action: none; }
        .vibe-calm { background: linear-gradient(135deg, #e0f2fe 0%, #fdf2f8 100%); }
        .vibe-energetic { background: linear-gradient(135deg, #fef3c7 0%, #ffedd5 100%); }
        .vibe-melancholy { background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%); }
        .vibe-mystic { background: linear-gradient(135deg, #f5f3ff 0%, #fae8ff 100%); }
        .ui-container { position: relative; z-index: 100; pointer-events: none; }
        .interactive-element { pointer-events: auto; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 2.5rem; box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05); }
        .vibe-btn { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid transparent; }
        .vibe-btn.active { border-color: currentColor; background: white; transform: scale(1.05); }
        
        /* 粒子動畫 */
        .burst-particle { position: fixed; pointer-events: none; z-index: 10000; display: flex; align-items: center; justify-content: center; animation: fireworks 1s cubic-bezier(0, 0.2, 0.5, 1) forwards; }
        @keyframes fireworks { 
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; } 
            100% { transform: translate(var(--x), var(--y)) scale(0) rotate(var(--r)); opacity: 0; } 
        }
        
        .fade-in { animation: fadeInUp 0.8s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .reaction-btn { transition: all 0.2s ease; }
        .reaction-btn:hover { background: rgba(255,255,255,0.8); transform: translateY(-2px); }
        .reaction-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="vibeBg" class="vibe-gradient vibe-calm"></div>
    <div id="orbContainer" class="fixed inset-0 pointer-events-none z-20 overflow-hidden"></div>
    <nav class="p-8 flex justify-between items-center ui-container max-w-6xl mx-auto">
        <h1 class="text-2xl font-black tracking-tighter text-slate-800 interactive-element">VIBE<span class="text-indigo-500">CHECK</span></h1>
    </nav>
    <main class="max-w-2xl mx-auto px-6 py-4 ui-container">
        <section class="text-center mb-12 fade-in">
            <h2 class="text-5xl font-bold mb-4 text-slate-800 tracking-tight">今天的你，是什麼顏色？</h2>
            <p class="text-lg text-slate-500 font-light italic">戳戳背景的氣泡，或者存下一則感觸。</p>
        </section>
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12 fade-in">
            <button onclick="setVibe('calm', '#0ea5e9', '平和')" class="vibe-btn glass-card p-6 flex flex-col items-center interactive-element active">
                <div class="text-3xl mb-2">🍃</div><span class="font-bold text-slate-700">平和</span>
            </button>
            <button onclick="setVibe('energetic', '#f59e0b', '活力')" class="vibe-btn glass-card p-6 flex flex-col items-center interactive-element">
                <div class="text-3xl mb-2">🔥</div><span class="font-bold text-slate-700">活力</span>
            </button>
            <button onclick="setVibe('melancholy', '#6366f1', '憂鬱')" class="vibe-btn glass-card p-6 flex flex-col items-center interactive-element">
                <div class="text-3xl mb-2">🌧️</div><span class="font-bold text-slate-700">憂鬱</span>
            </button>
            <button onclick="setVibe('mystic', '#d946ef', '神祕')" class="vibe-btn glass-card p-6 flex flex-col items-center interactive-element">
                <div class="text-3xl mb-2">✨</div><span class="font-bold text-slate-700">神祕</span>
            </button>
        </section>
        <section class="glass-card p-8 mb-16 fade-in interactive-element">
            <textarea id="messageInput" maxlength="50" class="w-full bg-transparent border-b border-slate-200 py-4 text-xl focus:outline-none focus:border-indigo-400" placeholder="在此輸入此刻感受..."></textarea>
            <div class="mt-6 flex justify-end">
                <button onclick="submitVibe(event)" class="bg-slate-900 text-white px-8 py-3 rounded-full font-bold shadow-xl hover:bg-indigo-600 transition-all active:scale-95">存入膠囊</button>
            </div>
        </section>
        <div id="vibeWall" class="grid gap-6 pb-20"></div>
    </main>
    <script>
        const API_URL = ""; 

        const INITIAL_DATA = [
            { id: 'v1', vibeType: 'calm', message: '深呼吸，一切都會好起來的。', userNickName: '安靜的貓', timestamp: new Date().toISOString(), reactions: { '✨': 5, '❤️': 3, '🌊': 2 } },
            { id: 'v2', vibeType: 'mystic', message: '星星在今晚特別閃耀，你有發現嗎？', userNickName: '觀星者', timestamp: new Date().toISOString(), reactions: { '✨': 12, '❤️': 8, '🌊': 1 } },
            { id: 'v3', vibeType: 'melancholy', message: '雨天的午後，適合聽一點爵士樂。', userNickName: '雨人', timestamp: new Date().toISOString(), reactions: { '✨': 2, '❤️': 4, '🌊': 7 } }
        ];

        let currentVibe = 'calm'; let currentVibeColor = '#0ea5e9'; const orbs = [];

        class InteractiveOrb {
            constructor() {
                this.el = document.createElement('div'); this.el.className = 'vibe-orb pointer-events-auto';
                this.size = Math.random() * 60 + 80; this.x = Math.random() * (window.innerWidth - this.size);
                this.y = Math.random() * (window.innerHeight - this.size); this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8; this.el.style.width = this.size + 'px'; this.el.style.height = this.size + 'px';
                this.updateColor(); this.el.addEventListener('mousedown', (e) => this.poke(e));
                document.getElementById('orbContainer').appendChild(this.el);
            }
            updateColor() { this.el.style.backgroundColor = currentVibeColor + '22'; this.el.style.borderColor = currentVibeColor + '44'; }
            poke(e) { 
                const force = 8; 
                this.vx += (this.x - e.clientX) * 0.02 * force; 
                this.vy += (this.y - e.clientY) * 0.02 * force; 
                burstFireworks(e.clientX, e.clientY, currentVibeColor); 
            }
            update() {
                this.x += this.vx; this.y += this.vy; 
                this.vx *= 0.98; this.vy *= 0.98;
                if (this.x <= 0 || this.x >= window.innerWidth - this.size) this.vx *= -1;
                if (this.y <= 0 || this.y >= window.innerHeight - this.size) this.vy *= -1;
                this.el.style.left = this.x + 'px'; this.el.style.top = this.y + 'px';
            }
        }

        // 修改：讓爆炸可以攜帶圖案或顏色
        function burstFireworks(x, y, colorOrEmoji, isEmoji = false) {
            const count = isEmoji ? 8 : 15;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div'); 
                p.className = 'burst-particle';
                p.style.left = x + 'px'; 
                p.style.top = y + 'px'; 
                
                if (isEmoji) {
                    p.innerText = colorOrEmoji;
                    p.style.fontSize = (Math.random() * 10 + 20) + 'px';
                } else {
                    p.style.backgroundColor = colorOrEmoji;
                    p.style.width = '8px';
                    p.style.height = '8px';
                    p.style.borderRadius = '50%';
                }

                p.style.setProperty('--x', (Math.random() - 0.5) * 300 + 'px'); 
                p.style.setProperty('--y', (Math.random() - 0.5) * 300 + 'px');
                p.style.setProperty('--r', (Math.random() * 360) + 'deg');

                document.body.appendChild(p); 
                setTimeout(() => p.remove(), 1000);
            }
        }

        function setVibe(vibe, color, name) {
            currentVibe = vibe; currentVibeColor = color;
            document.getElementById('vibeBg').className = `vibe-gradient vibe-${vibe}`;
            document.querySelectorAll('.vibe-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active'); orbs.forEach(o => o.updateColor());
        }

        function submitVibe(e) {
            const input = document.getElementById('messageInput'); const msg = input.value.trim(); if(!msg) return;
            const payload = {
                id: "vibe_" + Date.now(),
                vibeType: currentVibe,
                message: msg,
                userNickName: "旅人_" + Math.floor(Math.random()*999),
                timestamp: new Date().toISOString(),
                reactions: { '✨': 0, '❤️': 0, '🌊': 0 }
            };
            renderCard(payload, true); 
            burstFireworks(e.clientX, e.clientY, currentVibeColor); 
            input.value = '';
            if(API_URL) fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        }

        // 修改：處理表情點擊並噴發 Emoji
        function handleReaction(e, emoji, countSpan) {
            let count = parseInt(countSpan.innerText);
            countSpan.innerText = count + 1;
            // 噴發圖案
            burstFireworks(e.clientX, e.clientY, emoji, true);
        }

        function renderCard(data, isNew = false) {
            const wall = document.getElementById('vibeWall');
            const card = document.createElement('div');
            const colors = { calm: '#0ea5e9', energetic: '#f59e0b', melancholy: '#6366f1', mystic: '#d946ef' };
            const themeColor = colors[data.vibeType] || '#64748b';
            const reactions = data.reactions || { '✨': 0, '❤️': 0, '🌊': 0 };

            card.className = `glass-card p-6 border-l-4 interactive-element fade-in mb-2`; 
            card.style.borderLeftColor = themeColor;
            
            card.innerHTML = `
                <p class="text-lg text-slate-700">"${data.message}"</p>
                <div class="mt-4 flex justify-between items-end">
                    <div class="text-[10px] opacity-40 uppercase tracking-widest">
                        ${data.userNickName || '旅人'} • ${data.vibeType} • ${new Date(data.timestamp).toLocaleTimeString()}
                    </div>
                    <div class="flex gap-2">
                        ${Object.entries(reactions).map(([emoji, count]) => `
                            <button class="reaction-btn bg-white/50 px-2 py-1 rounded-full text-xs flex items-center gap-1 shadow-sm border border-white/50" 
                                    onclick="handleReaction(event, '${emoji}', this.querySelector('.count-val'))">
                                <span>${emoji}</span> <span class="count-val font-bold text-slate-500">${count}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            
            if (isNew) wall.prepend(card); else wall.appendChild(card);
        }

        window.onload = () => { 
            for(let i=0; i<12; i++) orbs.push(new InteractiveOrb()); 
            const loop = () => { orbs.forEach(o => o.update()); requestAnimationFrame(loop); }; 
            loop(); 
            INITIAL_DATA.forEach(data => renderCard(data));
        }
    </script>
</body>
</html>
